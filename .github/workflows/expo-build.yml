name: EAS Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Zielplattform"
        required: true
        default: "all"
        type: choice
        options: [all, android, ios]
      profile:
        description: "EAS Build-Profil"
        required: true
        default: "production"
        type: choice
        options: [development, preview, production]
  push:
    branches: [main]

jobs:
  build:
    name: EAS Build (${{ github.event.inputs.platform || 'all' }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Auto-fix Expo package versions
        run:  npx expo install --fix -- --non-interactive

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build (Android & iOS / Apple)
        run: |
          eas build \
            --platform ${{ github.event.inputs.platform || 'all' }} \
            --profile ${{ github.event.inputs.profile || 'production' }} \
            --non-interactive --no-wait
