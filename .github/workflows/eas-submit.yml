name: EAS Submit (App Store / Play Store)

# Übermittelt einen bereits gebauten Build an den Apple App Store / Google Play Store.
# Benötigt die EAS-Submit-Konfiguration in eas.json sowie hinterlegte Secrets.
on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Zielplattform"
        required: true
        default: "ios"
        type: choice
        options: [ios, android]

jobs:
  submit:
    name: Submit to Store
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Submit to store
        run: eas submit --platform ${{ github.event.inputs.platform }} --latest --non-interactive
