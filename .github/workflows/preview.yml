name: Preview Build

on:
  pull_request:
    branches: [main, develop]

jobs:
  preview:
    name: EAS Preview Update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx expo install --fix --non-interactive
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: eas update --branch pr-${{ github.event.number }} --message "Preview für PR #${{ github.event.number }}"
